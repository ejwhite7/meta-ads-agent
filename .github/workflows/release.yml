name: Release

# Publishes the `meta-ads-agent` CLI to npm whenever a `v*` git tag is pushed.
# Workflow:
#   1. Bump version in packages/cli/package.json (e.g. `pnpm --filter meta-ads-agent version patch`).
#   2. Commit + push, then `git tag v0.1.1 && git push --tags`.
#   3. This workflow runs CI then `pnpm publish` against the tag.
#
# Requires the repository secret NPM_TOKEN (npm.com → Access Tokens → "Automation").

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write       # for creating the GitHub Release
  id-token: write       # for npm provenance, when enabled

jobs:
  release:
    name: Build, test, publish
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: "https://registry.npmjs.org"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Verify tag matches package.json version
        run: |
          PKG_VERSION=$(node -p "require('./packages/cli/package.json').version")
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::Tag $GITHUB_REF_NAME does not match package version $PKG_VERSION"
            exit 1
          fi
          echo "Publishing version $PKG_VERSION (tag $GITHUB_REF_NAME)"

      - name: Publish to npm
        run: pnpm --filter meta-ads-agent publish --no-git-checks --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
